<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>m-grid static DOM demo</title>
    <link rel="stylesheet" href="../../packages/theme-default/src/base.css" />
    <link rel="stylesheet" href="../../packages/theme-default/src/light.css" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: #f3f4f6;
        color: #111827;
        font-family: system-ui, sans-serif;
      }

      main {
        max-width: 960px;
        margin-inline: auto;
      }

      h1 {
        font-size: 24px;
        margin-block: 0 16px;
      }

      .demo-toolbar {
        align-items: center;
        display: flex;
        gap: 12px;
        margin-block-end: 12px;
      }

      .demo-status {
        color: #4b5563;
        font-size: 14px;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
      }

      button:hover {
        background: #f9fafb;
        border-color: #9ca3af;
      }

      button:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>m-grid static DOM demo</h1>
      <div class="demo-toolbar">
        <button type="button" id="refresh-rows">Refresh rows</button>
        <span class="demo-status" id="refresh-status">Showing initial rows</span>
      </div>
      <div id="app"></div>
    </main>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
